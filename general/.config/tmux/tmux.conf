set-option -g allow-rename off
set-option -g automatic-rename on
# Window name format, branched on the foreground program:
#   editor (nvim/vim/hx/emacs): <folder>:<editor>:<basename(pane_title)>     e.g. "repo:nvim:foo.md"
#   claude:                     <folder>:claude:<1-or-2-word summary>       e.g. "repo:claude:fix-colors"
#   anything else:              <folder>:<program>                          e.g. "repo:zsh"
# The leading "<folder>:" is stripped by the window-status-{format,current-format} substitution below;
# it stays in the window_name so choose-window listings still disambiguate by folder.
# Claude pane_title looks like "<spinner-glyph> <summary words>". The summary is computed by the
# `tmux-claude-title` helper: it returns a cached value instantly, or the first word as a synchronous
# fallback while a background `claude -p` computes a 1-2 word summary (kebab-case) for next render.
# If claude CLI is missing or offline, the fallback is what stays in the bar; no failure path.
# The leading "#{s/.*//:#{pane_title}}" is an empty-string no-op that forces pane_title to be referenced
# BEFORE the #(...); tmux man: variables used inside #() must also appear earlier in the format string
# or the whole format silently returns empty. Without this prefix, some windows kept stale/empty names.
# (Note: "#{=0:VAR}" does NOT truncate to zero, it means "no truncation" and spills the full value.)
set-option -g automatic-rename-format "#{s/.*//:#{pane_title}}#{?#{||:#{m:*vim,#{pane_current_command}},#{||:#{==:#{pane_current_command},hx},#{==:#{pane_current_command},emacs}}},#{b:pane_current_path}:#{pane_current_command}:#{b:pane_title},#{?#{==:#{pane_current_command},claude},#{b:pane_current_path}:claude:#(tmux-claude-title #{q:pane_title}),#{b:pane_current_path}:#{pane_current_command}}}"

# Status-bar window label. Always strip the leading "<folder>:" so the bar shows just "claude:word",
# "nvim:file.md", "zsh", etc. Applies to manually renamed windows too (the user doesn't want to see
# the folder anywhere). The strip pattern needs a non-alnum separator after the leading chunk, so a
# single-word manual name like "readme" stays intact.
# For any "<prefix>:<rest>" shape (claude word, editor file, manual "foo:bar") the trailing
# segment is painted green so it stands out; "<prefix>:" keeps the base color.
# `#F` keeps tmux's `*` / `-` / `Z` flag indicators.
# Why the double s///: tmux's substitution parser uses ":" as the value separator, so a ":" inside
# the pattern (e.g. "[^:]+:") makes the whole #{} return literal garbage. So instead of one substitution
# that strips both "folder:" and "claude:", we run the same alnum-prefix strip twice.
# The "<prefix>" for the colored branch is extracted by stripping the separator-and-rest from
# strip-once: `s/[^a-zA-Z0-9._-].*//` keeps just the leading alnum chunk (no literal ":" in pattern).
# When @claude-done is set on the window the tab gets bold text on a darker bg (#504945, gruvbox dark2)
# so it stands out without changing the text colors. The Stop hook in ~/.claude/settings.json sets the
# flag when claude finishes a turn; the session-window-changed hook below clears it on user focus.
# `#{s/[*]/●/:#{window_flags}}` swaps tmux's active-window `*` marker for a `●` bullet; other flags
# (`-` last, `Z` zoomed, `!` activity, `~` silenced, `#` bell, `M` marked) pass through. MUST use the
# long-form `#{window_flags}`, NOT the `#F` shorthand: shorthand vars (#F, #I, #W, ...) resolve to
# empty when used as the source of an `s/.../.../:` substitution. `[*]` is the literal-asterisk form.
set -g window-status-format         '#{?#{==:#{@claude-done},1},#[bold bg=#504945],} #I:#[fg=#d5c4a1]#{?#{m:*:*,#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}},#{s/[^a-zA-Z0-9._-].*//:#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}}:#[fg=#b8bb26]#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}}#[fg=#d5c4a1],#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}}#[fg=default]#{s/[*]/●/:#{window_flags}} #[default]'
set -g window-status-current-format '#{?#{==:#{@claude-done},1},#[bold bg=#504945],} #[fg=#fe8019]#I#[fg=default]:#[fg=#d5c4a1]#{?#{m:*:*,#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}},#{s/[^a-zA-Z0-9._-].*//:#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}}:#[fg=#b8bb26]#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}}#[fg=#d5c4a1],#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}}#[fg=default]#{s/[*]//:#{window_flags}} #[default]'
# rename-window prompt: pre-fill with the same folder-stripped name the bar shows.
bind , command-prompt -I "#{s/^[a-zA-Z0-9._-]+[^a-zA-Z0-9._-]//:#{window_name}}" { rename-window -- "%%" }
# Clear the claude-done flag whenever the user actually looks at the window.
set-hook -g session-window-changed 'set-option -w @claude-done 0'
# start in 1
set -g base-index 1
setw -g pane-base-index 1
bind c new-window -c "#{pane_current_path}"

# pane movement with colemak layout
bind h select-pane -L
bind n select-pane -D
bind e select-pane -U
bind i select-pane -R

# Bind new windows and panes to current path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Moving windows/panes
bind-key m choose-window -F "#{window_index}: #{window_name}" "join-pane -h -t %%"
bind-key M choose-window -F "#{window_index}: #{window_name}" "join-pane -v -t %%"


# Moving Window
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

bind -r k next-window
bind -r K previous-window
bind -r ^ last-window
bind -r o last-window
bind -r O kill-window -a\; break-pane
bind -r \' run-shell "while tmux next-window 2> /dev/null; do tmux kill-window; done"


# search
bind-key -T copy-mode K send-keys -X search-reverse
bind-key -T copy-mode k send-keys -X search-again

bind-key -T copy-mode-vi K send-keys -X search-reverse
bind-key -T copy-mode-vi k send-keys -X search-again

# resizing
# -r let's the command be repeated
bind -r C-h resize-pane -L 5
bind -r C-n resize-pane -D 5
bind -r C-e resize-pane -U 5
bind -r C-i resize-pane -R 5
# this uses the c-i code since C-i doesn't work
# set -s user-keys[0] "\e[105;5u"
# bind -r User0 resize-pane -R 5

bind -r u switch-client -l # in default config is l
bind X confirm-before kill-session


# rather use prefix + (
bind-key -r q run-shell "tmux neww -n tgpt tgpt -i"
bind-key -r Q run-shell "tmux neww -n quick quick"
bind-key -r l run-shell "tmux neww -n web tmux-web"
bind-key -r P run-shell "tmux neww -n play tmux-play"


# do this to open a new one and choose yourself
bind-key -r F run-shell "tmux neww bash -c 'nf'"
bind-key -r D run-shell "tmux neww bash -c 'nd'"
bind-key -r T run-shell "tmux neww bash -c 'nt'"
bind-key s choose-tree -Zs
bind-key N run-shell "tmux-new-here"

# bind-key -r N run-shell "nf $NOTES/"
bind-key -r G run-shell "switch-back-to-nvim"
set-option -g display-time 4000

# show cwd ?
